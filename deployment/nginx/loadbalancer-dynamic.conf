# =================================
# Nginx Dynamic Load Balancer Configuration
# =================================
# Works with Docker Compose scaling
# Automatically discovers API replicas via Docker DNS

resolver 127.0.0.11 valid=10s;  # Docker internal DNS

server {
    listen 80;
    server_name localhost;

    # Logging
    access_log /var/log/nginx/api_access.log;
    error_log /var/log/nginx/api_error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # API routes - uses Docker DNS to resolve all api replicas
    location / {
        set $backend "api:8000";
        proxy_pass http://$backend;

        # File upload settings
        client_max_body_size 100M;
        proxy_request_buffering off;
    }
}

