# =================================
# Docker Compose - Document Analysis Agent
# =================================
# 1 API pod (default) with auto-scaling support
# Load Balancer + Frontend
# Same-site security enabled
# =================================

services:
  # =================================
  # Load Balancer (Nginx)
  # =================================
  loadbalancer:
    image: nginx:alpine
    container_name: doc-agent-lb
    ports:
      - "8000:80"
    volumes:
      - ./nginx/loadbalancer-dynamic.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - doc-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =================================
  # API Service (scalable - starts with 1 replica)
  # =================================
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - SAME_SITE_ENFORCE=${SAME_SITE_ENFORCE:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,localhost:8000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-text}
    volumes:
      - chroma-data:/app/data/chroma
    networks:
      - doc-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # =================================
  # Frontend (React)
  # =================================
  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    container_name: doc-agent-frontend
    ports:
      - "3000:80"
    depends_on:
      - loadbalancer
    networks:
      - doc-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# =================================
# Networks
# =================================
networks:
  doc-agent-network:
    driver: bridge

# =================================
# Volumes
# =================================
volumes:
  chroma-data:
    driver: local

